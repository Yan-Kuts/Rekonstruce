<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rekonstruce — Kalkulačka prací</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; }
        .modal { animation: modalPop 0.3s ease; }
        @keyframes modalPop { from { transform: scale(0.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body class="bg-gray-50 min-h-screen pb-12">

<div class="max-w-6xl mx-auto p-6">

    <!-- ШАПКА: власник, адреса, назва -->
    <div class="bg-white rounded-3xl shadow p-8 mb-8">
        <div class="grid grid-cols-1 md:grid-cols-12 gap-6">
            <div class="md:col-span-4">
                <label class="block text-sm text-gray-500 mb-1">Jméno vlastníka</label>
                <input id="owner" type="text" placeholder="Jan Novák" class="w-full px-5 py-3 border rounded-2xl focus:border-emerald-500 outline-none">
            </div>
            <div class="md:col-span-5">
                <label class="block text-sm text-gray-500 mb-1">Adresa objektu</label>
                <input id="address" type="text" placeholder="Ulice 123, Město" class="w-full px-5 py-3 border rounded-2xl focus:border-emerald-500 outline-none">
            </div>
            <div class="md:col-span-3">
                <label class="block text-sm text-gray-500 mb-1">Název zakázky</label>
                <input id="client" type="text" placeholder="Rekonstrukce bytu" class="w-full px-5 py-3 border rounded-2xl focus:border-emerald-500 outline-none">
            </div>
        </div>
        <div id="date" class="text-sm text-gray-400 mt-4 text-right"></div>
    </div>

    <!-- КАРТКИ РОЗДІЛІВ -->
    <h2 class="text-2xl font-semibold mb-6">Kategorie prací</h2>
    <div class="grid grid-cols-2 md:grid-cols-5 gap-4" id="categoryCards"></div>

    <!-- ПІДСУМКИ -->
    <div class="mt-12 bg-white rounded-3xl shadow p-8 flex justify-between items-center text-3xl">
        <div>Celková plocha: <span id="totalArea" class="font-bold text-emerald-600">0.00 m²</span></div>
        <div>Celková cena: <span id="totalSum" class="font-bold text-emerald-600">0 Kč</span></div>
    </div>

    <!-- Кнопки дій -->
    <div class="flex gap-4 mt-8">
        <button onclick="newProject()" class="flex-1 bg-gray-200 hover:bg-gray-300 py-5 rounded-3xl text-xl font-medium">Nový projekt</button>
        <button onclick="showHistory()" class="flex-1 bg-gray-200 hover:bg-gray-300 py-5 rounded-3xl text-xl font-medium">Historie projektů</button>
        <button onclick="generatePDF()" class="flex-1 bg-emerald-600 hover:bg-emerald-700 text-white py-5 rounded-3xl text-xl font-medium flex items-center justify-center gap-3">
            <i class="fas fa-file-pdf"></i> Vytvořit PDF
        </button>
    </div>
</div>

<!-- МОДАЛЬНЕ ВІКНО РОЗДІЛУ -->
<div id="modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50">
    <div class="modal bg-white rounded-3xl shadow-2xl w-full max-w-3xl mx-4 max-h-[90vh] overflow-hidden">
        <div class="px-8 py-6 border-b flex justify-between items-center">
            <h3 id="modalTitle" class="text-2xl font-semibold"></h3>
            <button onclick="closeModal()" class="text-3xl leading-none text-gray-400 hover:text-black">×</button>
        </div>
        <div class="p-8" id="modalContent"></div>
    </div>
</div>

<script>
    let currentProject = {
        owner: "", address: "", client: "",
        data: {
            "Bourání": [],
            "Odpadů": [],
            "Materiálu": [],
            "Zednické práce": [],
            "Sanitární práce": []
        }
    };

    const presetsBourani = [
        { name: "Bourání stěn – cihla", price: 400 },
        { name: "Bourání stěn – Ytong", price: 300 },
        { name: "Bourání stěn – beton", price: 500 },
        { name: "Bourání stěn – sádrokarton/umakart", price: 300 },
        { name: "Bourání obkladu", price: 400 },
        { name: "Snímání staré barvy", price: 50 },
        { name: "Snímání podlahy (linoleum, laminát, parkety, vinyl)", price: 200 }
    ];

    const categories = Object.keys(currentProject.data);

    // Рендер карток категорій
    function renderCategoryCards() {
        const container = document.getElementById('categoryCards');
        container.innerHTML = '';
        categories.forEach(cat => {
            const count = currentProject.data[cat].length;
            const card = document.createElement('div');
            card.className = "bg-white rounded-3xl shadow p-6 hover:shadow-xl transition cursor-pointer";
            card.innerHTML = `
                <div class="flex justify-between items-start">
                    <div>
                        <div class="text-emerald-600 text-3xl mb-2"><i class="fas fa-folder"></i></div>
                        <h4 class="text-xl font-semibold">${cat}</h4>
                        <p class="text-sm text-gray-500">${count} položek</p>
                    </div>
                    <div class="text-emerald-500 text-4xl">→</div>
                </div>
            `;
            card.onclick = () => openCategory(cat);
            container.appendChild(card);
        });
    }

    // Відкриття категорії
    function openCategory(cat) {
        document.getElementById('modalTitle').textContent = cat;
        const content = document.getElementById('modalContent');
        let html = `<div class="space-y-8">`;

        // Якщо це Bourání — показуємо пресети
        if (cat === "Bourání") {
            html += `<div class="bg-emerald-50 rounded-2xl p-6"><h5 class="font-medium mb-4 text-emerald-700">Rychlé přidání typických prací</h5>`;
            presetsBourani.forEach((preset, i) => {
                html += `
                <div class="flex justify-between items-center bg-white rounded-xl p-4 shadow-sm mb-3">
                    <div class="flex-1">${preset.name}</div>
                    <div class="text-emerald-600 font-medium">${preset.price} Kč/m²</div>
                    <input id="presetArea${i}" type="number" step="0.01" placeholder="m²" class="w-24 mx-4 px-3 py-2 border rounded-xl text-center">
                    <button onclick="addPreset('${cat}', ${i})" class="bg-emerald-600 text-white px-6 py-2 rounded-xl hover:bg-emerald-700">Přidat</button>
                </div>`;
            });
            html += `</div>`;
        }

        // Таблиця робіт у категорії
        html += `<h5 class="font-medium text-lg mb-3">Přidané práce</h5>`;
        html += `<table class="w-full"><thead><tr class="bg-gray-100"><th class="text-left px-4 py-3">Název</th><th class="text-center px-4 py-3">m²</th><th class="text-right px-4 py-3">Cena za m²</th><th class="text-right px-4 py-3">Celkem</th><th></th></tr></thead><tbody id="modalTable">`;
        currentProject.data[cat].forEach((item, i) => {
            const sum = item.area * item.price;
            html += `<tr><td class="px-4 py-3">${item.name}</td><td class="text-center">${item.area}</td><td class="text-right">${item.price} Kč</td><td class="text-right font-medium">${sum.toFixed(0)} Kč</td><td><button onclick="deleteItem('${cat}', ${i});" class="text-red-500"><i class="fas fa-trash"></i></button></td></tr>`;
        });
        html += `</tbody></table></div>`;

        content.innerHTML = html;
        document.getElementById('modal').classList.remove('hidden');
    }

    function addPreset(cat, index) {
        const areaInput = document.getElementById(`presetArea${index}`);
        const area = parseFloat(areaInput.value);
        if (!area || area <= 0) return alert('Zadejte plochu v m²');
        
        const preset = presetsBourani[index];
        currentProject.data[cat].push({ name: preset.name, area: area, price: preset.price });
        areaInput.value = '';
        saveToLocalStorage();
        renderCategoryCards();
        openCategory(cat); // оновлюємо модальне вікно
    }

    function deleteItem(cat, index) {
        if (confirm('Smazat položku?')) {
            currentProject.data[cat].splice(index, 1);
            saveToLocalStorage();
            renderCategoryCards();
            openCategory(cat);
        }
    }

    function closeModal() {
        document.getElementById('modal').classList.add('hidden');
        renderCategoryCards();
        updateTotals();
    }

    function updateTotals() {
        let totalArea = 0;
        let totalSum = 0;
        Object.values(currentProject.data).flat().forEach(item => {
            totalArea += item.area;
            totalSum += item.area * item.price;
        });
        document.getElementById('totalArea').textContent = totalArea.toFixed(2) + ' m²';
        document.getElementById('totalSum').textContent = totalSum.toFixed(0) + ' Kč';
    }

    function saveToLocalStorage() {
        currentProject.owner = document.getElementById('owner').value;
        currentProject.address = document.getElementById('address').value;
        currentProject.client = document.getElementById('client').value;
        localStorage.setItem('rekonstruceCurrent', JSON.stringify(currentProject));
    }

    function loadFromLocalStorage() {
        const saved = localStorage.getItem('rekonstruceCurrent');
        if (saved) {
            currentProject = JSON.parse(saved);
            document.getElementById('owner').value = currentProject.owner || '';
            document.getElementById('address').value = currentProject.address || '';
            document.getElementById('client').value = currentProject.client || '';
        }
        renderCategoryCards();
        updateTotals();
    }

    function newProject() {
        if (confirm('Vytvořit nový projekt? (aktuální bude uložen do historie)')) {
            saveToLocalStorage();
            currentProject = { owner: "", address: "", client: "", data: { "Bourání": [], "Odpadů": [], "Materiálu": [], "Zednické práce": [], "Sanitární práce": [] } };
            document.getElementById('owner').value = '';
            document.getElementById('address').value = '';
            document.getElementById('client').value = '';
            saveToLocalStorage();
            renderCategoryCards();
            updateTotals();
        }
    }

    function showHistory() {
        alert('Historie projektů bude brzy rozšířena. Zatím se vše automaticky ukládá v prohlížeči.');
        // Можна розширити пізніше
    }

    function generatePDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        const date = new Date().toLocaleDateString('cs-CZ');

        doc.setFontSize(20);
        doc.text('Rekonstruce — Kalkulačka prací', 20, 20);
        doc.setFontSize(12);
        doc.text(`Vlastník: ${document.getElementById('owner').value || '—'}`, 20, 35);
        doc.text(`Adresa: ${document.getElementById('address').value || '—'}`, 20, 42);
        doc.text(`Zakázka: ${document.getElementById('client').value || '—'}`, 20, 49);
        doc.text(`Datum: ${date}`, 20, 56);

        let y = 70;
        Object.keys(currentProject.data).forEach(cat => {
            if (currentProject.data[cat].length === 0) return;
            doc.setFontSize(14);
            doc.text(cat, 20, y);
            y += 8;

            const tableData = currentProject.data[cat].map((item, i) => [
                i + 1, item.name, item.area.toFixed(2), item.price.toFixed(0), (item.area * item.price).toFixed(0)
            ]);

            doc.autoTable({ startY: y, head: [['Č.', 'Název', 'm²', 'Cena/m²', 'Celkem']], body: tableData, theme: 'striped', headStyles: { fillColor: [16, 185, 129] } });
            y = doc.lastAutoTable.finalY + 15;
        });

        const totalArea = Object.values(currentProject.data).flat().reduce((s, i) => s + i.area, 0);
        const totalSum = Object.values(currentProject.data).flat().reduce((s, i) => s + i.area * i.price, 0);

        doc.setFontSize(16);
        doc.text(`Celková plocha: ${totalArea.toFixed(2)} m²`, 20, y + 10);
        doc.text(`Celková cena: ${totalSum.toFixed(0)} Kč`, 20, y + 20);

        doc.save(`Rekonstruce_${date}.pdf`);
    }

    // Автозбереження при зміні полів
    document.querySelectorAll('#owner, #address, #client').forEach(el => {
        el.addEventListener('input', saveToLocalStorage);
    });

    // Ініціалізація
    document.getElementById('date').textContent = new Date().toLocaleDateString('cs-CZ', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
    loadFromLocalStorage();
    setInterval(saveToLocalStorage, 3000); // кожні 3 секунди автосейв
</script>
</body>
</html>
