<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rekonstrukce</title>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <style>
    body { font-family: Arial; margin:0; background:#f4f4f4; }
    header {
      background:#222; color:white; padding:15px;
      display:flex; justify-content:space-between;
    }
    button { padding:6px 10px; cursor:pointer; margin:2px; }

    .container { display:flex; padding:15px; }
    .sidebar, .right-panel, .content {
      background:white; padding:15px; margin:5px;
    }
    .sidebar { width:220px; }
    .right-panel { width:300px; }
    .content { flex:1; }

    .category { padding:8px; background:#eee; margin-bottom:5px; cursor:pointer; }

    input { width:100%; padding:5px; margin-top:5px; }

    .hidden { display:none; }

    #auth {
      position:fixed; top:0; left:0; right:0; bottom:0;
      background:rgba(0,0,0,0.8);
      display:flex; align-items:center; justify-content:center;
    }

    .auth-box {
      background:white; padding:20px; width:300px;
    }
  </style>
</head>

<body>

<!-- AUTH -->
<div id="auth">
  <div class="auth-box">
    <h3>Login / Registrace</h3>
    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Heslo">
    <button onclick="register()">Registrace</button>
    <button onclick="login()">Přihlásit</button>
  </div>
</div>

<header>
  <div><strong>Rekonstrukce</strong></div>
  <div>
    <button onclick="newProject()">Nová rekonstrukce</button>
    <button onclick="showHistory()">Historie</button>
    <button onclick="logout()">Odhlásit</button>
  </div>
</header>

<div class="container">

  <div class="sidebar">
    <h3>Kategorie</h3>
    <div class="category" onclick="addWork('Demolice')">Demolice</div>
    <div class="category" onclick="addWork('Odpad')">Odpad</div>
    <div class="category" onclick="addWork('Malování')">Malování</div>
    <div class="category" onclick="addWork('Obklady')">Obklady</div>
    <div class="category" onclick="addWork('Elektro')">Elektro</div>
    <div class="category" onclick="addWork('Instalace')">Instalace</div>
    <div class="category" onclick="addWork('Podlahy')">Podlahy</div>
  </div>

  <div class="content">
    <h2>Projekt</h2>
    <div id="works"></div>
  </div>

  <div class="right-panel">
    <h3>Souhrn</h3>
    <div id="summary"></div>
    <h3>Celkem: <span id="total">0</span> Kč</h3>

    <button onclick="saveProject()">Uložit</button>
    <button onclick="exportPDF()">Export PDF</button>
  </div>

</div>

<script>
let works = [];
let currentUser = null;

function register(){
  const email = document.getElementById("email").value;
  const pass = document.getElementById("password").value;

  localStorage.setItem(email, pass);
  alert("Registrováno");
}

function login(){
  const email = document.getElementById("email").value;
  const pass = document.getElementById("password").value;

  const stored = localStorage.getItem(email);

  if(stored === pass){
    currentUser = email;
    document.getElementById("auth").style.display = "none";
  } else {
    alert("Chyba přihlášení");
  }
}

function logout(){
  location.reload();
}

function newProject(){
  works = [];
  renderWorks();
}

function addWork(category){
  works.push({category, quantity:0, price:0});
  renderWorks();
}

function renderWorks(){
  const container = document.getElementById("works");
  container.innerHTML = "";

  works.forEach((w,i)=>{
    container.innerHTML += `
      <div>
        <b>${w.category}</b>
        <input type="number" placeholder="Množství" value="${w.quantity}"
          onchange="update(${i},'quantity',this.value)">
        <input type="number" placeholder="Cena"
          value="${w.price}"
          onchange="update(${i},'price',this.value)">
        <div>Mezisoučet: ${w.quantity * w.price} Kč</div>
        <hr>
      </div>
    `;
  });

  renderSummary();
}

function update(i,field,value){
  works[i][field] = parseFloat(value)||0;
  renderWorks();
}

function renderSummary(){
  let total = 0;
  const summary = document.getElementById("summary");
  summary.innerHTML = "";

  works.forEach(w=>{
    let sum = w.quantity * w.price;
    total += sum;
    summary.innerHTML += `<div>${w.category}: ${sum} Kč</div>`;
  });

  document.getElementById("total").innerText = total;
}

function saveProject(){
  if(!currentUser) return alert("Přihlaste se");

  let projects = JSON.parse(localStorage.getItem("projects")||"{}");

  if(!projects[currentUser]) projects[currentUser] = [];

  projects[currentUser].push({
    date: new Date(),
    works: works
  });

  localStorage.setItem("projects", JSON.stringify(projects));

  alert("Uloženo");
}

function showHistory(){
  let projects = JSON.parse(localStorage.getItem("projects")||"{}");
  let userProjects = projects[currentUser] || [];

  alert("Počet projektů: " + userProjects.length);
}

function exportPDF(){
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  let y = 10;

  doc.text("Rekonstrukce - Projekt", 10, y);
  y += 10;

  works.forEach(w=>{
    let sum = w.quantity * w.price;
    doc.text(`${w.category} - ${sum} Kč`, 10, y);
    y += 8;
  });

  let total = works.reduce((a,b)=>a + (b.quantity*b.price),0);
  y += 10;
  doc.text("Celkem: " + total + " Kč", 10, y);

  doc.save("projekt.pdf");
}
</script>

</body>
</html>
