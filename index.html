<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rekonstruce 2026</title>
  <style>
    :root {
      --primary: #27ae60;
      --dark: #2c3e50;
    }
    * { box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      margin: 0;
      padding: 15px;
      background: #f4f6f9;
      color: #333;
      line-height: 1.5;
    }
    h1 {
      text-align: center;
      color: var(--dark);
      margin: 10px 0 20px;
    }
    .card {
      background: white;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.08);
      padding: 18px;
      margin-bottom: 20px;
    }
    label {
      display: block;
      margin: 8px 0 5px;
      font-weight: 600;
      color: var(--dark);
    }
    input, select {
      width: 100%;
      padding: 12px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 16px; /* зручно для телефону */
    }
    .required { color: #e74c3c; }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 12px;
      font-size: 15px;
    }
    th, td {
      padding: 10px 8px;
      text-align: left;
      border-bottom: 1px solid #eee;
    }
    th {
      background: var(--primary);
      color: white;
      font-weight: 600;
    }
    input[type="number"] {
      width: 80px;
      text-align: center;
    }
    .total-row {
      font-weight: bold;
      font-size: 1.1em;
      color: var(--primary);
    }
    button {
      background: var(--primary);
      color: white;
      border: none;
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      margin: 8px 4px 8px 0;
    }
    button:hover { background: #219653; }

    .grand-total {
      font-size: 1.5em;
      font-weight: bold;
      text-align: center;
      padding: 15px;
      background: white;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
      margin: 20px 0;
      color: var(--primary);
    }

    .note {
      font-size: 0.85em;
      color: #777;
      text-align: center;
      margin-top: 15px;
    }

    /* Мобільна адаптація */
    @media (max-width: 600px) {
      body { padding: 10px; }
      .card { padding: 14px; }
      table { font-size: 14px; }
      th, td { padding: 8px 6px; }
      input[type="number"] { width: 65px; }
    }
  </style>
</head>
<body>

  <h1>Rekonstruce 2026</h1>

  <!-- Основна інформація -->
  <div class="card">
    <h2>Nová zakázka</h2>
    <label>Jméno vlastníka <span class="required">*</span></label>
    <input type="text" id="owner" placeholder="Jan Novák">

    <label>Adresa objektu <span class="required">*</span></label>
    <input type="text" id="address" placeholder="Ulice 123, Město">

    <label>Název zakázky <span class="required">*</span></label>
    <input type="text" id="projectName" placeholder="Kompletní rekonstrukce bytu 3+1">
  </div>

  <!-- Категорії робіт -->
  <div id="categories"></div>

  <!-- Матеріали -->
  <div class="card">
    <h2>Materiálu</h2>
    <button onclick="addMaterial()">+ Přidat materiál</button>
    <table id="materialTable">
      <thead>
        <tr>
          <th>Materiál</th>
          <th>Množství</th>
          <th>Jednotka</th>
          <th>Cena/jedn. (Kč)</th>
          <th>Celkem</th>
          <th></th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

  <div class="grand-total" id="grandTotal">Celková cena: 0 Kč</div>

  <button onclick="saveProject()" style="width:100%; padding:16px; font-size:18px;">Uložit zakázku</button>

  <div class="note">
    Ceny jsou orientační za práci (bez materiálu a DPH) — rok 2026.<br>
    Můžete je upravovat ručně.
  </div>

  <script>
    const categoriesData = [
      { name: "Bourání", items: [
        {name:"Osekání omítky", unit:"m²", price:130},
        {name:"Osekání obkladů", unit:"m²", price:160},
        {name:"Bourání SDK příček", unit:"m²", price:220},
        {name:"Demontáž podlahy", unit:"m²", price:160},
        {name:"Demontáž sanity", unit:"ks", price:1300},
        {name:"Demontáž dveří", unit:"ks", price:650}
      ]},
      { name: "Zednické práce", items: [
        {name:"Stavba SDK příček", unit:"m²", price:780},
        {name:"Vyrovnání stěn", unit:"m²", price:190},
        {name:"Jádrová omítka", unit:"m²", price:260},
        {name:"Finální stěrka", unit:"m²", price:140},
        {name:"Samonivelační potěr", unit:"m²", price:300}
      ]},
      { name: "Obklady", items: [
        {name:"Pokládka obkladů na stěny", unit:"m²", price:620},
        {name:"Pokládka dlažby", unit:"m²", price:720},
        {name:"Hydroizolace", unit:"m²", price:230},
        {name:"Spárování", unit:"m²", price:160}
      ]},
      { name: "Podlahy", items: [
        {name:"Pokládka laminátu/vinylu", unit:"m²", price:290},
        {name:"Broušení parket", unit:"m²", price:380},
        {name:"Montáž lišt", unit:"bm", price:120}
      ]},
      { name: "Elektroinstalace", items: [
        {name:"Rozvody za bod", unit:"ks", price:1900},
        {name:"Montáž osvětlení", unit:"ks", price:580}
      ]},
      { name: "Instalatérské práce", items: [
        {name:"Rozvody vody + odpad", unit:"bm", price:1350},
        {name:"Montáž sanity", unit:"ks", price:4500}
      ]},
      { name: "Topení a VZT", items: [
        {name:"Montáž radiátorů", unit:"ks", price:3200},
        {name:"Rozvody topení", unit:"bm", price:950},
        {name:"Podlahové topení", unit:"m²", price:980}
      ]},
      { name: "Malování a dokončování", items: [
        {name:"Malování stěn a stropů", unit:"m²", price:95},
        {name:"Montáž lišt", unit:"bm", price:120},
        {name:"Finální úklid", unit:"m²", price:90}
      ]},
      { name: "Doprava a úklid", items: [
        {name:"Dovoz materiálu", unit:"ks", price:2800},
        {name:"Odvoz odpadu", unit:"ks", price:5200}
      ]}
    ];

    function renderCategories() {
      const container = document.getElementById('categories');
      container.innerHTML = '';

      categoriesData.forEach(cat => {
        let html = `<div class="card"><h2>${cat.name}</h2><table><thead><tr><th>Práce</th><th>Množství</th><th>Jedn.</th><th>Cena (Kč)</th><th>Celkem</th><th></th></tr></thead><tbody>`;

        cat.items.forEach((item, i) => {
          const id = `${cat.name.replace(/\s/g,'')}-${i}`;
          html += `
            <tr>
              <td>${item.name}</td>
              <td><input type="number" id="qty-${id}" value="0" min="0" oninput="calcRow('${id}')"></td>
              <td>${item.unit}</td>
              <td><input type="number" id="price-${id}" value="${item.price}" min="0" oninput="calcRow('${id}')"></td>
              <td id="total-${id}" class="total-row">0</td>
              <td><button onclick="this.closest('tr').remove(); updateTotal()">×</button></td>
            </tr>`;
        });
        html += `</tbody></table></div>`;
        container.innerHTML += html;
      });
    }

    window.calcRow = function(id) {
      const qty = parseFloat(document.getElementById(`qty-${id}`).value) || 0;
      const price = parseFloat(document.getElementById(`price-${id}`).value) || 0;
      document.getElementById(`total-${id}`).textContent = Math.round(qty * price);
      updateTotal();
    };

    function updateTotal() {
      let sum = 0;
      document.querySelectorAll('td[id^="total-"]').forEach(td => {
        sum += parseFloat(td.textContent) || 0;
      });
      // Матеріали
      document.querySelectorAll('#materialTable tbody tr').forEach(row => {
        sum += parseFloat(row.cells[4].textContent) || 0;
      });
      document.getElementById('grandTotal').textContent = `Celková cena: ${sum} Kč`;
    }

    window.addMaterial = function() {
      const tbody = document.getElementById('materialTable').querySelector('tbody');
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td><input type="text" placeholder="Název materiálu"></td>
        <td><input type="number" value="0" min="0" oninput="calcMaterial(this)"></td>
        <td>
          <select onchange="calcMaterial(this)">
            <option>m²</option>
            <option>bm</option>
            <option>ks</option>
            <option>kg</option>
            <option>litry</option>
          </select>
        </td>
        <td><input type="number" value="0" min="0" oninput="calcMaterial(this)"></td>
        <td>0</td>
        <td><button onclick="this.closest('tr').remove(); updateTotal()">×</button></td>
      `;
      tbody.appendChild(tr);
    };

    window.calcMaterial = function(el) {
      const row = el.closest('tr');
      const qty = parseFloat(row.cells[1].querySelector('input').value) || 0;
      const price = parseFloat(row.cells[3].querySelector('input').value) || 0;
      row.cells[4].textContent = Math.round(qty * price);
      updateTotal();
    };

    window.saveProject = function() {
      const owner = document.getElementById('owner').value.trim();
      const address = document.getElementById('address').value.trim();
      const name = document.getElementById('projectName').value.trim();

      if (!owner || !address || !name) {
        alert("Prosím vyplňte všechna povinná pole (jméno, adresa, název zakázky)!");
        return;
      }

      alert(`✅ Zakázka "${name}" úspěšně uložena!\n\nZákazník: ${owner}\nAdresa: ${address}\n\n${document.getElementById('grandTotal').textContent}`);
    };

    // Запуск
    renderCategories();
    setInterval(updateTotal, 1000);
  </script>
</body>
</html>
