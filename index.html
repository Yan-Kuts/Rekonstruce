<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rekonstruce — Kalkulačka prací</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; }
        .scroll-container::-webkit-scrollbar { height: 8px; }
        .modal { animation: modalPop 0.3s ease; }
        @keyframes modalPop { from { transform: scale(0.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body class="bg-gray-50 min-h-screen pb-12">

<div class="max-w-6xl mx-auto p-6">

    <!-- Інформація про проект -->
    <div class="bg-white rounded-3xl shadow p-8 mb-8">
        <div class="grid grid-cols-1 md:grid-cols-12 gap-6">
            <div class="md:col-span-4">
                <label class="block text-sm text-gray-500 mb-1">Jméno vlastníka</label>
                <input id="owner" type="text" placeholder="Jan Novák" 
                       class="w-full px-5 py-3 border border-gray-300 rounded-2xl focus:border-emerald-500 outline-none">
            </div>
            <div class="md:col-span-5">
                <label class="block text-sm text-gray-500 mb-1">Adresa objektu</label>
                <input id="address" type="text" placeholder="Ulice 123, Město" 
                       class="w-full px-5 py-3 border border-gray-300 rounded-2xl focus:border-emerald-500 outline-none">
            </div>
            <div class="md:col-span-3">
                <label class="block text-sm text-gray-500 mb-1">Název zakázky</label>
                <input id="client" type="text" placeholder="Rekonstrukce bytu" 
                       class="w-full px-5 py-3 border border-gray-300 rounded-2xl focus:border-emerald-500 outline-none">
            </div>
        </div>
    </div>

    <!-- Заголовок + кнопка збереження -->
    <div class="flex justify-between items-center mb-4">
        <h2 class="text-2xl font-semibold">Kategorie prací</h2>
        <button onclick="saveProject()" 
                class="bg-emerald-600 hover:bg-emerald-700 text-white px-6 py-3 rounded-2xl font-medium flex items-center gap-2">
            <i class="fas fa-save"></i> Uložit zakázku
        </button>
    </div>

    <!-- Горизонтальна прокрутка розділів -->
    <div class="scroll-container overflow-x-auto pb-4 -mx-1">
        <div class="flex gap-4 w-max" id="categoryCards"></div>
    </div>

    <!-- Підсумки -->
    <div class="mt-12 bg-white rounded-3xl shadow p-8 flex justify-between items-center text-3xl">
        <div>Celková plocha: <span id="totalArea" class="font-bold text-emerald-600">0.00 m²</span></div>
        <div>Celková cena: <span id="totalSum" class="font-bold text-emerald-600">0 Kč</span></div>
    </div>

    <!-- Нижні кнопки -->
    <div class="flex gap-4 mt-8">
        <button onclick="newProject()" class="flex-1 bg-gray-200 hover:bg-gray-300 py-5 rounded-3xl text-xl font-medium">Nový projekt</button>
        <button onclick="showHistory()" class="flex-1 bg-gray-200 hover:bg-gray-300 py-5 rounded-3xl text-xl font-medium">Historie zakázek</button>
        <button onclick="generatePDF()" class="flex-1 bg-emerald-600 hover:bg-emerald-700 text-white py-5 rounded-3xl text-xl font-medium flex items-center justify-center gap-3">
            <i class="fas fa-file-pdf"></i> Vytvořit PDF
        </button>
    </div>
</div>

<!-- Модальне вікно -->
<div id="modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50">
    <div class="modal bg-white rounded-3xl shadow-2xl w-full max-w-3xl mx-4 max-h-[90vh] overflow-hidden">
        <div class="px-8 py-6 border-b flex justify-between items-center bg-white sticky top-0 z-10">
            <h3 id="modalTitle" class="text-2xl font-semibold"></h3>
            <button onclick="closeModal()" class="text-3xl leading-none text-gray-400 hover:text-black">×</button>
        </div>
        <div class="p-8 overflow-auto" id="modalContent" style="max-height: calc(90vh - 80px);"></div>
    </div>
</div>

<script>
    let projects = JSON.parse(localStorage.getItem('rekonstruceProjects') || '[]');
    let currentProject = {
        id: Date.now(),
        date: new Date().toISOString(),
        owner: "", 
        address: "", 
        client: "",
        data: {
            "Bourání": [],
            "Odpadů": [],
            "Materiálu": [],
            "Zednické práce": [],
            "Sanitární práce": []
        }
    };

    const presetsBourani = [
        { name: "Bourání stěn – cihla", price: 400 },
        { name: "Bourání stěn – Ytong", price: 300 },
        { name: "Bourání stěn – beton", price: 500 },
        { name: "Bourání stěn – sádrokarton/umakart", price: 300 },
        { name: "Bourání obkladu", price: 400 },
        { name: "Snímání staré barvy", price: 50 },
        { name: "Snímání podlahy (linoleum, laminát, parkety, vinyl)", price: 200 }
    ];

    const categories = Object.keys(currentProject.data);

    function renderCategoryCards() {
        const container = document.getElementById('categoryCards');
        container.innerHTML = '';
        categories.forEach(cat => {
            const count = currentProject.data[cat].length;
            const card = document.createElement('div');
            card.className = "bg-white rounded-3xl shadow p-6 hover:shadow-xl transition cursor-pointer min-w-[260px]";
            card.innerHTML = `
                <div class="flex justify-between items-start">
                    <div>
                        <div class="text-emerald-600 text-3xl mb-2"><i class="fas fa-folder"></i></div>
                        <h4 class="text-xl font-semibold">${cat}</h4>
                        <p class="text-sm text-gray-500">${count} položek</p>
                    </div>
                    <div class="text-emerald-500 text-4xl">→</div>
                </div>
            `;
            card.onclick = () => openCategory(cat);
            container.appendChild(card);
        });
    }

    function openCategory(cat) {
        document.getElementById('modalTitle').textContent = cat;
        let html = `<div class="space-y-8">`;

        if (cat === "Bourání") {
            html += `<div class="bg-emerald-50 rounded-2xl p-6"><h5 class="font-medium mb-4 text-emerald-700">Rychlé přidání prací</h5>`;
            presetsBourani.forEach((preset, i) => {
                html += `
                <div class="flex justify-between items-center bg-white rounded-xl p-4 shadow-sm mb-3">
                    <div class="flex-1 pr-4">${preset.name}</div>
                    <div class="text-emerald-600 font-medium whitespace-nowrap">${preset.price} Kč/m²</div>
                    <input id="presetArea${i}" type="number" step="0.01" placeholder="m²" 
                           class="w-24 mx-4 px-3 py-2 border border-gray-300 rounded-xl text-center">
                    <button onclick="addPreset('${cat}', ${i})" 
                            class="bg-emerald-600 text-white px-6 py-2 rounded-xl hover:bg-emerald-700">Přidat</button>
                </div>`;
            });
            html += `</div>`;
        }

        html += `<h5 class="font-medium text-lg mb-3">Přidané práce v kategorii</h5>`;
        html += `<table class="w-full"><thead><tr class="bg-gray-100"><th class="text-left px-4 py-3">Název</th><th class="text-center px-4 py-3">m²</th><th class="text-right px-4 py-3">Cena
