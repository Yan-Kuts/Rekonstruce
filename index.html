<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rekonstruce — Kalkulačka prací</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .karta {
      transition: all 0.2s ease;
    }
    .karta:hover {
      border-color: #4ade80;
      transform: translateY(-4px);
      box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1);
    }
    .icon-box {
      transition: all 0.2s ease;
    }
    .karta:hover .icon-box {
      background-color: #bbf7d0;
    }
  </style>
</head>
<body class="bg-gray-50 min-h-screen">

  <div class="max-w-5xl mx-auto bg-white shadow-lg min-h-screen">

    <!-- Header / Tabs (як на скріншоті) -->
    <div class="border-b bg-white sticky top-0 z-10">
      <div class="flex items-center justify-between px-6 py-3 text-sm">
        <div class="flex gap-6 text-gray-600">
          <a href="#" class="hover:text-gray-900">Nová zakázka</a>
          <a href="#" class="hover:text-gray-900">Historie zakázek</a>
        </div>
        <div class="flex items-center gap-4 text-xs text-gray-500">
          <span>Čt 26. 3. 2026</span>
        </div>
      </div>
    </div>

    <div class="p-6">

      <!-- Верхні поля -->
      <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
        <div>
          <label class="block text-sm text-gray-600 mb-1">Jméno vlastníka</label>
          <input type="text" value="Jan Novák" 
                 class="w-full border border-gray-300 rounded-lg px-4 py-3 focus:outline-none focus:border-green-500">
        </div>
        <div>
          <label class="block text-sm text-gray-600 mb-1">Adresa objektu</label>
          <input type="text" value="Ulice 123, Město" 
                 class="w-full border border-gray-300 rounded-lg px-4 py-3 focus:outline-none focus:border-green-500">
        </div>
        <div>
          <label class="block text-sm text-gray-600 mb-1">Název zakázky</label>
          <input type="text" value="Rekonstrukce bytu" 
                 class="w-full border border-gray-300 rounded-lg px-4 py-3 focus:outline-none focus:border-green-500">
        </div>
      </div>

      <!-- Секція Категорії праці -->
      <div class="mb-8">
        <div class="flex justify-between items-center mb-5">
          <h2 class="text-xl font-semibold text-gray-800">Kategorie prací</h2>
          
          <button onclick="ulozitZakazku()" 
                  class="flex items-center gap-2 bg-green-600 hover:bg-green-700 text-white px-6 py-3 rounded-xl font-medium transition-colors">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2 2 2 0 01-2 2v-9a2 2 0 012-2 2 2 0 01-2-2z" />
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 14v6m-3-3h6" />
            </svg>
            Uložit zakázku
          </button>
        </div>

        <!-- Grid з 7 категоріями -->
        <div class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-4" id="kategorie-grid">

          <!-- Bourání -->
          <div onclick="vybratKategorii(this)" class="karta bg-white border-2 border-gray-200 rounded-2xl p-5 text-center cursor-pointer">
            <div class="icon-box w-14 h-14 bg-green-100 text-green-600 rounded-2xl flex items-center justify-center mx-auto mb-4 text-3xl">
              🏗️
            </div>
            <h3 class="font-semibold text-gray-800">Bourání</h3>
            <p class="text-sm text-gray-500 mt-2" id="count-bourani">0 položek</p>
          </div>

          <!-- Odpadů -->
          <div onclick="vybratKategorii(this)" class="karta bg-white border-2 border-gray-200 rounded-2xl p-5 text-center cursor-pointer">
            <div class="icon-box w-14 h-14 bg-green-100 text-green-600 rounded-2xl flex items-center justify-center mx-auto mb-4 text-3xl">
              🗑️
            </div>
            <h3 class="font-semibold text-gray-800">Odpadů</h3>
            <p class="text-sm text-gray-500 mt-2" id="count-odpadu">0 položek</p>
          </div>

          <!-- Materiálu -->
          <div onclick="vybratKategorii(this)" class="karta bg-white border-2 border-gray-200 rounded-2xl p-5 text-center cursor-pointer">
            <div class="icon-box w-14 h-14 bg-green-100 text-green-600 rounded-2xl flex items-center justify-center mx-auto mb-4 text-3xl">
              📦
            </div>
            <h3 class="font-semibold text-gray-800">Materiálu</h3>
            <p class="text-sm text-gray-500 mt-2" id="count-materialu">0 položek</p>
          </div>

          <!-- Zednické práce -->
          <div onclick="vybratKategorii(this)" class="karta bg-white border-2 border-gray-200 rounded-2xl p-5 text-center cursor-pointer">
            <div class="icon-box w-14 h-14 bg-green-100 text-green-600 rounded-2xl flex items-center justify-center mx-auto mb-4 text-3xl">
              🧱
            </div>
            <h3 class="font-semibold text-gray-800">Zednické práce</h3>
            <p class="text-sm text-gray-500 mt-2" id="count-zednicke">0 položek</p>
          </div>

          <!-- Obklady (нова) -->
          <div onclick="vybratKategorii(this)" class="karta bg-white border-2 border-gray-200 rounded-2xl p-5 text-center cursor-pointer">
            <div class="icon-box w-14 h-14 bg-green-100 text-green-600 rounded-2xl flex items-center justify-center mx-auto mb-4 text-3xl">
              🏠
            </div>
            <h3 class="font-semibold text-gray-800">Obklady</h3>
            <p class="text-sm text-gray-500 mt-2" id="count-obklady">0 položek</p>
          </div>

          <!-- Kompletace (нова) -->
          <div onclick="vybratKategorii(this)" class="karta bg-white border-2 border-gray-200 rounded-2xl p-5 text-center cursor-pointer">
            <div class="icon-box w-14 h-14 bg-green-100 text-green-600 rounded-2xl flex items-center justify-center mx-auto mb-4 text-3xl">
              🔧
            </div>
            <h3 class="font-semibold text-gray-800">Kompletace</h3>
            <p class="text-sm text-gray-500 mt-2" id="count-kompletace">0 položek</p>
          </div>

          <!-- Doprava (нова) -->
          <div onclick="vybratKategorii(this)" class="karta bg-white border-2 border-gray-200 rounded-2xl p-5 text-center cursor-pointer">
            <div class="icon-box w-14 h-14 bg-green-100 text-green-600 rounded-2xl flex items-center justify-center mx-auto mb-4 text-3xl">
              🚚
            </div>
            <h3 class="font-semibold text-gray-800">Doprava</h3>
            <p class="text-sm text-gray-500 mt-2" id="count-doprava">0 položek</p>
          </div>

        </div>
      </div>

      <!-- Підсумки -->
      <div class="grid grid-cols-2 gap-6 mb-8">
        <div class="bg-gray-100 rounded-2xl p-6">
          <p class="text-gray-600 text-sm">Celková plocha</p>
          <p class="text-3xl font-semibold text-green-600 mt-1">0.00 m²</p>
        </div>
        <div class="bg-gray-100 rounded-2xl p-6">
          <p class="text-gray-600 text-sm">Celková cena</p>
          <p class="text-3xl font-semibold text-green-600 mt-1">0 Kč</p>
        </div>
      </div>

      <!-- Нижні кнопки -->
      <div class="flex flex-wrap gap-4">
        <button onclick="novyProjekt()" 
                class="flex-1 bg-gray-200 hover:bg-gray-300 text-gray-700 font-medium py-4 rounded-2xl transition-colors">
          Nový projekt
        </button>
        
        <button onclick="zobrazitHistorii()" 
                class="flex-1 bg-gray-200 hover:bg-gray-300 text-gray-700 font-medium py-4 rounded-2xl transition-colors">
          Historie zakázek
        </button>
        
        <button onclick="vytvoritPDF()" 
                class="flex-1 bg-green-600 hover:bg-green-700 text-white font-medium py-4 rounded-2xl flex items-center justify-center gap-3 transition-colors">
          <span>Vytvořit PDF</span>
          <span class="text-xl">📄</span>
        </button>
      </div>

    </div>
  </div>

  <script>
    function vybratKategorii(el) {
      // Знімаємо виділення з усіх
      document.querySelectorAll('.karta').forEach(card => {
        card.classList.remove('border-green-500', 'ring-2', 'ring-green-500');
      });
      // Додаємо виділення
      el.classList.add('border-green-500', 'ring-2', 'ring-green-500');
      
      console.log('Вибрано:', el.querySelector('h3').textContent);
      // Тут можна відкривати форму для додавання робіт у цю категорію
    }

    function ulozitZakazku() {
      alert('Zakázka uložena! ✅');
    }

    function novyProjekt() {
      if (confirm('Vytvořit nový projekt?')) {
        location.reload();
      }
    }

    function zobrazitHistorii() {
      alert('Zatím žádná historie...');
    }

    function vytvoritPDF() {
      alert('PDF se generuje... 📄');
    }

    // Приклад: оновлення кількості (можна викликати після додавання робіт)
    function aktualizovatPocet(id, pocet) {
      const el = document.getElementById(id);
      if (el) el.textContent = pocet + ' položek';
    }
  </script>
</body>
</html>
